front:
  text: 洞玄靈寶道士受三洞經誡法籙擇日曆
  hash: sha256:229b0d896a7f62e5ce8c4ac276ae48098aaee6d8376534a477e0c4457f778534
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0049_HFL_000-001a, image: hfl/0990/0990-044.png}
body:
  text: 京三洞弟子清都觀道士張萬福撰伏尋三洞經教四輔法文元始所說道君傳授而衆聖修行群真禮誦祕之三境流布十方代歷塵沙年踰浩劫方乎日月諭之水火凡聖共觀人天等用法雖無量軌範不殊世雖有革威儀恆一至如出家入道須有受持大德法師宜相指授弟子既來丹倒師主當備科儀理須敬奉經文遵承典格必使三盟可則六證匪虧學道有師持經不犯而辭誓巳納齊奏在期各從所請預宜擇日期之經法難以改移須自分明詎容混漫頃諸師者先用甲子為良或以正一受道曆通傳三洞且如甲子道德三皇用之受道之曆治籙符圖等事至於上清靈寶自有吉辰豈得雷同莫分涇渭而吳蜀二境京洛兩都遞相承用因循靡革萬福仰惟積善慶及庸微既厠道流又參真祕自升淨域向五十許年從師結誓亦四十餘載敢窺瓊檢竊誦金章香燈之暇輒此撰録秖望示之門人未敢聞之于外先修三洞衆戒巳具二十一卷中恐披卷軸繁多罕能存録今指行此一卷庶弟子志之正一仙靈符籙等甲子和合乙丑上剋下丙寅丁卯和合戊辰自刑巳巳和合庚午下剋上辛未和合壬申癸酉和合甲戌上剋下乙亥和合丙子下剋上丁丑相生戊寅下剋上已卯下剋上庚辰相生自刑辛巳下剋上壬午上剋下癸未下剋上甲申乙酉下剋上丙戌上生下和合丁亥下剋上戊子上剋下已丑專和合吉庚寅上剋下辛卯上剋下壬辰下剋上癸巳上剋下甲午上生下乙未上剋下丙申丁酉上尅下凶戊戌專吉是天門不入靖已亥上剋下自刑庚子和合辛丑下生上和合壬寅癸卯上生下和合甲辰上剋下自刑乙巳上生下吉丙午專火自刑丁未上生下吉戊申已酉上生下自刑庚戌下生上吉辛亥上生下自刑壬子專水吉癸丑下剋上甲寅乙卯專木吉丙辰自刑丁巳專火吉戊午下生上自刑巳未專土吉庚申專金吉辛酉專金自刑壬戌下剋上癸亥專水自刑凡受道合和上下相生大吉專小吉自刑上下相剋凶不可度法籙經戒陽平鹿堂等二十四治及遊散宿治正月二月子日五十倍丑日二十倍寅日殺子卯日殺婦辰日大吉巳日自如午日九倍未日殺身申日殺婦酉日小吉戌日七十倍亥日五十倍三月四月子日五十倍丑日殺母寅日大通卯日小吉辰日小凶巳日十倍千日師自殃未日三十倍申日三十倍酉日五十倍戌日二十倍亥日二十倍五月六月子日殺母丑日害母寅日大凶卯日殺父辰日殺母巳日小凶午日殺子未日殺子申日殺母酉日五十倍戌日二十倍亥日不吉七月八月子日大通丑日大凶寅日小凶卯日殺父辰日殺母巳日二十倍午日殺母未日五十倍申日殺子酉日殺母戌日二十倍亥日五十倍九月十月子日自如丑日自如寅日小凶卯日二十倍辰日五倍巳日六十倍午日大凶未日三十倍申日二十倍酉日二十倍戌日殺子亥日殺婦十一月十二月子日殺子丑日殺婦寅日小凶卯日五十倍辰日五十倍巳日殺婦午日殺父未日七十倍申日三十倍酉日三十倍戌日大凶亥日殺婦凡十二件度道吉凶日明尋之勿犯二條出正一法文度籙度治儀老君金鈕及經目并經等右凡受道營齊用王相本命甲子朔望日皆佳出太玄部老君傳儀注訣神呪符契圖經等右用正月上甲及每月一日十五日卯酉時良出神呪經洞神三皇符圖經等右齊之辰及傳授皆擇王相本命甲子甲申甲寅此為三元最吉出洞神經十四卷洞玄靈寶自然劵中盟經真文二籙靈䇿神杖等右春用甲寅乙卯夏用丁巳丙午四季用戊辰戊戌巳未巳丑秋用庚申辛酉冬用癸亥壬子建王之日登壇也五法右受六甲符當以甲子日夜於庭壇風雨入室禁山云以夜半設祭不言其日五嶽用月上建夜半三皇云夜半於庭壇敷席不言日五符云吉日清淨夜半時於庭壇敷席出陶公傳儀今以六甲附老經禁山三皇同洞神法五嶽五符依靈寶法也河圖寶籙右以元正之夜行之最吉諸月三日二十七日此是尊皇降見之日及甲子甲午庚申本命太歲八節日皆大吉出九皇醮儀上清七劵經目及經三籙諸法太素玄都紫紋交帶等正月九日十日二月八日九日三月七日八日四月六日七日五月五日六日六月四日五日七月三日四日八月二日三日九月一日二日十月十日十一日十一月十一日十二日十二月十二日十三日巳上謂之天關九開之日亦曰朝太素日陶云今歲某子直辰天關九開每月止一日臧宗道云傳三洞經法用天關九開日出上清經及真誥中凡厥受道皆有三盟初中微心以誠信又須六證監視威儀正其虧闕既人有利鈍致法有尊卑而漸頓宜殊勤怠須隔自微至著以近涉深聖人垂㫖接引如流即初請法各有階差依其次第不可乖越但以世中道士衣食纍身且救目前未思死後少能向道已是勇猛難勝若不携提便恐歸依路絶所以一壇之內數法不同三盟之中參受各異若人人别受法法殊壇非唯師與弟子弊其形勞抑亦仙官煩於召請欲使古今取則凡聖合宜事以道通法因人制庶上則諧於聖㫖下則得於凡心即天尊善權至道舍育其為博也如抱愚不變執滯匪移實恐拯接路迷信向情斷其有假道賣法求利取人罔冒賢良欺謾愚騃而髙張聲譽遠俟招呼妄設軌模空為法則者置之言外吾所不論也竊見男女同壇或師弟不相對齊或師弟各自遊行或結齊之後始來告赴或不投辭誓或抱素盡空或師借經法及假人經法或師為出法信或數師同壇或不書表剌不分契劵或法次交互不期良日或虛注保證及廣書名德如此之流情所不忍復有無經法恃其豪富勢力及名望髙遠耻人不歸强相招引為他傳授亦有曾受一法兩法或道德十戒乃唱言自云凡諸道法我並師受或薄解符章禁祝小技出入天庭或富貴人驅使或百姓信向豐衣足食少有僮朴使人傳唱招致弟子為傳經法或恃以年髙德重俄然戴冠為人師範北之流例舉目皆是豈思冥咎罪殃及乎已身分甘𡨋苦其奈七祖九玄所生父母何世有殺父弒君反天違地自取夷滅者亦同怪乎哉既一壇之內參受不同宜就尊法告齊立限取其良日其中小法齊內摶授昔嘗遊江淮吳蜀而師資付度甚自輕率至於齊靜殊不盡心唯專醮祭夜中施設近來此風少行京洛良由供奉道士多此中人持兹鄙俗施於帝里又云靖忌道父母忌不入靖燒香愚人景慕用為竒訣其道父母靖忌上禁祭酒奏章設醮元不及三洞上法至如戍辰己巳戊戌已亥隨日流行而十齊八節五通太素朝第山等天之定日求仙要頷若與之㑹得不朝真者乎此蓋濟世小道非修身上法汝之弟子宜識之焉其或十齊八節既是衆聖按行條記功過亦曰良辰雖經不指言例之為善傳道所用必諧聖㫖復有上帝殺伐日云不可舉百事此秖合藥營建諸所禁防至於受道固應無礙而始學初門幸能避之徍也三洞上法久悟法人自不拘也按金明道科但法具周辦即登齊告盟未使擇日賢者詳之洞玄靈寶道士受三洞經誡法籙擇日曆
